name: Rafraichir token Instagram

on:
  schedule:
    - cron: "0 4 1 * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dependances
        run: pip install requests pynacl

      - name: Rafraichir le token et mettre a jour le secret
        env:
          IG_TOKEN:       ${{ secrets.IG_TOKEN }}
          GH_SECRETS_PAT: ${{ secrets.GH_SECRETS_PAT }}
        run: python refresh_token.py
