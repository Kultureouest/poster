name: Poster reseaux Kulture Ouest

on:
  schedule:
    - cron: "*/15 * * * *"
  push:
    paths:
      - "file/**"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: poster
  cancel-in-progress: false

jobs:
  poster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dependances
        run: pip install requests

      - name: Poster les jobs dus
        env:
          IG_TOKEN:       ${{ secrets.IG_TOKEN }}
          IG_BUSINESS_ID: ${{ secrets.IG_BUSINESS_ID }}
          FB_PAGE_TOKEN:  ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID:     ${{ secrets.FB_PAGE_ID }}
        run: python run_file.py

      - name: Regenerer l'agenda ICS des posts
        if: always()
        run: python generate_agenda_ics.py

      - name: Archiver les jobs traites
        if: always()
        run: |
          git config user.name  "kulture-ouest-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Archivage jobs reseaux + agenda ICS [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          else
            echo "Rien a committer."
          fi
