name: Agenda ICS posts reseaux
on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: agenda-ics
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generer l'ICS
        run: python generate_agenda_ics.py
      - name: Commit si change
        run: |
          git config user.name  "kulture-ouest-bot"
          git config user.email "bot@users.noreply.github.com"
          git add agenda-reseaux.ics
          if git diff --cached --quiet; then
            echo "Pas de changement."
          else
            git commit -m "MAJ agenda-reseaux.ics [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          fi
